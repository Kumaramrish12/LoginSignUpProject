<div class="login-wrapper">

  <div class="login-container">

    <h2>Login</h2>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="Email"
          name="Email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="Password"
          name="Password"
          required
        />
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <p class="signup-text">
      Don't have an account?
      <span routerLink="/signup">Signup</span>
    </p>

  </div>

</div>
