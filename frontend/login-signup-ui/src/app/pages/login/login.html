<div class="login-container">

  <h2>Login Page</h2>

  <form (ngSubmit)="login()">

    <label>Email</label>

    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
    />

    <label>Password</label>

    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit">Login</button>

  </form>

  <p>
    Don't have an account?
    <a routerLink="/signup">Signup here</a>
  </p>

</div>
