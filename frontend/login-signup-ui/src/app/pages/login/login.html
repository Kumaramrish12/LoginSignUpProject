<div class="login-container">

<h2>Login Page</h2>

<form (ngSubmit)="login()">

<label>Email</label>

<input
type="email"
[(ngModel)]="Email"
name="Email"
required
/>

<label>Password</label>

<input
type="password"
[(ngModel)]="Password"
name="Password"
required
/>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<button routerLink="/signup">Signup</button>
</p>

</div>
